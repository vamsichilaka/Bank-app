apiVersion: apps/v1
kind: Deployment

metadata:
  name: bank-app
  namespace: bank

spec:
  replicas: 2

  selector:
    matchLabels:
      app: bank-app

  template:
    metadata:
      labels:
        app: bank-app

    spec:
      containers:
      - name: bank-app
        image: 432004896257.dkr.ecr.ap-south-1.amazonaws.com/bank-app:v1

        ports:
        - containerPort: 3000

        readinessProbe:
          httpGet:
            path: /health
            port: 3000
          initialDelaySeconds: 10
          periodSeconds: 5

        livenessProbe:
          httpGet:
            path: /health
            port: 3000
          initialDelaySeconds: 30
          periodSeconds: 10
